---
  - name: Install perl-CPAN and perl-App-cpanminus on Debian
    become: yes
    apt:
      name: "{{ item }}"
      state: present
    loop:
      - perl-CPAN
      - cpanminus
      - libreadline6-dev
      - systemtap-sdt-dev
      - zlib1g-dev libssl-dev
      - libpam0g-dev
      - python3-dev
      - bison
      - flex
      - libipc-run-perl
      - wget 

  - name: Install perl-IPC-Run and Text::Trim using CPAN on both Debian and Red Hat
    become: yes
    command: cpanm IPC::Run Text::Trim

  - name: install Percona Platform for PostgreSQL deb packages
    apt:
      name: "{{ packages }}"
      update_cache: yes
      state: latest
    vars:
      postgres_version: 16
      packages:
      - percona-postgresql
      - percona-postgresql-{{ postgres_version }}
      - percona-postgresql-all
      - percona-postgresql-client
      - percona-postgresql-client-{{ postgres_version }}
      - percona-postgresql-common
      - percona-postgresql-contrib
      - percona-postgresql-doc
      - percona-postgresql-doc-{{ postgres_version }}
      - percona-postgresql-plperl-{{ postgres_version }}
      - percona-postgresql-plpython3-{{ postgres_version }}
      - percona-postgresql-pltcl-{{ postgres_version }}
      - percona-postgresql-server-dev-{{ postgres_version }}
      - percona-postgresql-server-dev-all
      - percona-postgresql-{{ postgres_version }}-dbgsym
      - percona-postgresql-client-{{ postgres_version }}-dbgsym
      - percona-postgresql-plperl-{{ postgres_version }}-dbgsym
      - percona-postgresql-plpython3-{{ postgres_version }}-dbgsym
      - percona-postgresql-pltcl-{{ postgres_version }}-dbgsym
    when: ansible_os_family == "Debian"
    environment:
      PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  - name: Clone pg_stat_monitor sources
    git:
      repo: "{{ repo }}"
      version: "{{ version }}"
      dest: /tmp/pg_stat_monitor
    vars:
      repo: "{{ lookup('env', 'COMPONENT_REPO') }}"
      version: "{{ lookup('env', 'COMPONENT_VERSION') }}"
    become_user: postgres

  - name: Build pg_stat_monitor from sources
    make:
      chdir: "/tmp/pg_stat_monitor"
      params:
        USE_PGXS: 1

  - name: Install pg_stat_monitor from sources
    make:
      target: install
      chdir: "/tmp/pg_stat_monitor"
      params:
        USE_PGXS: 1

  - name: Add extensions to postgresql.conf for RHEL
    lineinfile:
      path: /etc/postgresql/16/main/postgresql.conf
      line: shared_preload_libraries = 'pg_stat_monitor'

  - name: Stop postgresql service for Debian based
    service:
      name: postgresql
      state: stopped

  - name: Start postgresql service for Debian based
    service:
      name: postgresql
      state: started
      enabled: true




##====================================================
    steps:
      - name: Clone pg_stat_monitor repository
        uses: actions/checkout@v2
        with:
          path: 'src/pg_stat_monitor'

      - name: Delete old postgresql files
        run: |
          sudo apt-get update
          sudo apt purge postgresql-client-common postgresql-common \
            postgresql postgresql*
          sudo apt-get install -y libreadline6-dev systemtap-sdt-dev \
            zlib1g-dev libssl-dev libpam0g-dev python3-dev bison flex \
            libipc-run-perl wget 
          sudo rm -rf /var/lib/postgresql /var/log/postgresql /etc/postgresql \
            /usr/lib/postgresql /usr/include/postgresql /usr/share/postgresql \
            /etc/postgresql
          sudo rm -f /usr/bin/pg_config
          sudo /usr/bin/perl -MCPAN -e 'install IPC::RUN'
          sudo /usr/bin/perl -MCPAN -e 'install Text::Trim'

      - name: Install percona-release script
        run: |
          sudo apt-get -y update
          sudo apt-get -y upgrade
          sudo apt-get install -y wget gnupg2 curl lsb-release
          sudo wget \
            https://repo.percona.com/apt/percona-release_latest.generic_all.deb
          sudo dpkg -i percona-release_latest.generic_all.deb

      - name: Install Percona Distribution Postgresql 16
        run: |
          sudo percona-release setup ppg-16
          sudo apt-get update -y
          sudo apt-get install -y percona-postgresql-16 \
            percona-postgresql-contrib percona-postgresql-server-dev-all

      - name: Change src owner to postgres
        run: |
          sudo chmod o+rx ~
          sudo chown -R postgres:postgres src

      - name: Build pg_stat_monitor
        run: |
          sudo -u postgres bash -c 'make USE_PGXS=1'
          sudo make USE_PGXS=1 install
        working-directory: src/pg_stat_monitor

      - name: Start pg_stat_monitor_tests
        run: |
          sudo service postgresql stop
          echo "shared_preload_libraries = 'pg_stat_monitor'" | 
            sudo tee -a /etc/postgresql/16/main/postgresql.conf
          sudo service postgresql start
          sudo psql -V
          export PG_TEST_PORT_DIR=${GITHUB_WORKSPACE}/src/pg_stat_monitor
          echo $PG_TEST_PORT_DIR
          sudo -E -u postgres bash -c 'make installcheck USE_PGXS=1'
        working-directory: src/pg_stat_monitor